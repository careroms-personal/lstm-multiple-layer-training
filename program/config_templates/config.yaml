# All directory or path is from config file base directory
# All datasource must be same pattern for one trining propose
datasource:
  type: files
  config:
    file_dir: ""
    file_list: []
    format: csv      # csv | parquet | json

  #Other type will come after

training_data:
  validation_data_ratio: 0.2
  test_data_ratio: 0.1
  timeseries_column: "timestamp" # Required: for sorting data
  target_columns: []      # Required: columns to predict
  feature_columns: []  # Optional: non-target inputs like hour_of_day, is_backup

lstm_models:
  - name: model_1
    window_size: 24
    units: [64, 32]
    dropout: 0.2
    float_type: float32

training_setting:
  epochs: 50
  batch_size: 32
  patience: 10
  gradient_clip: 1.0
  seed: 42
  optimizer: 
    type: adam
    learning_rate: 0.001
    beta1: 0.9
    beta2: 0.999
    eps: 0.00000001
    weight_decay: 0.0
  loss: mse

  #For set parallel training. 0 mean train all at once
  max_parallel: 1
  use_gpu: true
  memory_growth: true

ensemble:
  enabled: false
  method: stacking
  stacking:
    meta_learner: linear_regression

output:
  model_output_path: ""

  write_output: # Optional, if not existed, nothing write
    enabled: false
    training_data_path: ""
    logs_path: "./logs"

debug:
  dataset_preparation:
    main_executor: false
    sub_executor: false
  model_preparation:
    main_executor: false
  model_training:
    main_executor: false
    model_build_executor: false
    model_test_executor: false