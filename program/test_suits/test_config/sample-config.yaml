datasource:
  type: files
  config:
    file_dir: "./sample-dataset" # from config file directory
    format: csv
    file_list:
      - "disk_sim_5min.csv"

  #Other type will come after

training_data:
  validation_data_ratio: 0.2
  test_data_ratio: 0.2
  timeseries_column: "elapsed_s"
  target_columns: [disk_gb]
  feature_columns: []

lstm_models:
  - name: day_prediction
    window_size: 288
    units: [64, 32]
    dropout: 0.2
    float_type: float32
  
  - name: week_prediction
    window_size: 2016
    units: [64, 32]
    dropout: 0.2
    float_type: float32

  # - name: 2_week_prediction
  #   window_size: 4032
  #   units: [64, 32]
  #   dropout: 0.2
  #   float_type: float32

training_setting:
  epochs: 50
  batch_size: 32
  patience: 10
  seed: 42
  optimizer:
    type: adam
    learning_rate: 0.0001
  loss: mse
  gradient_clip: 1.0

  max_parallel: 2
  use_gpu: true
  memory_growth: true

ensemble:
  enabled: true
  method: stacking
  stacking:
    meta_learner: linear_regression

output:
  model_output_path: "./training/model"

  write_output:
    enabled: true
    training_data_path: "./training/dataset"
    logs_path: "./training/logs"

debug:
  dataset_preparation:
    main_executor: false
    sub_executor: false
  model_preparation:
    main_executor: false
  model_training:
    main_executor: false
    model_build_executor: false
    model_test_executor: false